{% extends "base.html" %}

{% block title %}Notifications{% endblock %}

{% block content %}
<div class="max-w-screen-xl mx-auto px-8 py-10">
    <h1 class="font-display text-4xl tracking-tighter mb-8">Notifications</h1>
    
    <div class="bg-white border border-slate-200 rounded-3xl divide-y">
        {% for i in range(5) %}
        <div class="px-7 py-5 flex gap-x-4 items-start">
            <div class="w-2.5 h-2.5 mt-2 bg-emerald-500 rounded-full flex-shrink-0"></div>
            <div class="flex-1">
                <div class="font-medium">New message received</div>
                <div class="text-sm text-slate-600">Sarah Kimani sent you a message about the CRM project.</div>
                <div class="text-xs text-emerald-600 mt-1">2 hours ago</div>
            </div>
        </div>
        {% else %}
        <div class="px-7 py-12 text-center text-slate-500">No notifications yet.</div>
        {% endfor %}
    </div>
</div>
{% endblock %}

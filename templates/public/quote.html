{% extends "base.html" %}

{% block title %}Request a Quote{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto px-8 py-14">
    <div class="text-center mb-10">
        <div class="text-emerald-600 text-xs tracking-[3px]">GET STARTED</div>
        <h1 class="font-display text-5xl tracking-tighter mt-3">Tell us about your project</h1>
        <p class="mt-4 text-lg text-slate-600">We'll get back to you within 24 hours with a custom proposal.</p>
    </div>
    
    <div class="bg-white border border-slate-200 p-9 rounded-3xl">
        <form method="POST" action="{{ url_for('quote.request_quote') }}">
            <div class="grid md:grid-cols-2 gap-5">
                <div>
                    <label class="text-sm font-medium">Project Type</label>
                    <select name="project_type" required class="mt-2 w-full px-5 py-3.5 border border-slate-200 rounded-3xl">
                        <option value="">Select type</option>
                        <option>Web Development</option>
                        <option>Software Development</option>
                        <option>Academic Writing</option>
                        <option>Thesis & Dissertation Support</option>
                        <option>IT Consultancy</option>
                        <option>Graphic Design & Branding</option>
                        <option>Freelancing Services</option>
                    </select>
                </div>
                <div>
                    <label class="text-sm font-medium">Budget Range</label>
                    <select name="budget_range" class="mt-2 w-full px-5 py-3.5 border border-slate-200 rounded-3xl">
                        <option>Under KES 100,000</option>
                        <option>KES 100,000 – 500,000</option>
                        <option>KES 500,000 – 1,500,000</option>
                        <option>Over KES 1,500,000</option>
                    </select>
                </div>
            </div>
            
            <div class="mt-5">
                <label class="text-sm font-medium">Project Description</label>
                <textarea name="description" rows="5" required placeholder="Describe your project requirements..." class="mt-2 w-full px-5 py-3.5 border border-slate-200 rounded-3xl"></textarea>
            </div>
            
            <div class="grid md:grid-cols-2 gap-5 mt-5">
                <div>
                    <label class="text-sm font-medium">Timeline</label>
                    <select name="timeline" class="mt-2 w-full px-5 py-3.5 border border-slate-200 rounded-3xl">
                        <option>1-2 months</option>
                        <option>3-4 months</option>
                        <option>5-6 months</option>
                        <option>Flexible</option>
                    </select>
                </div>
                <div>
                    <label class="text-sm font-medium">Preferred Contact</label>
                    <select name="contact_method" class="mt-2 w-full px-5 py-3.5 border border-slate-200 rounded-3xl">
                        <option>Email</option>
                        <option>Phone Call</option>
                        <option>WhatsApp</option>
                    </select>
                </div>
            </div>
            
            <button type="submit" class="mt-8 w-full py-4 bg-emerald-600 text-white font-semibold rounded-3xl">Submit Quote Request</button>
        </form>
    </div>
</div>
{% endblock %}

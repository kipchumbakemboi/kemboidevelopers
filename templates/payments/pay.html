{% extends "base.html" %}

{% block title %}Make Payment{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto px-8 py-12">
    <div class="text-center mb-8">
        <h1 class="font-display text-4xl tracking-tighter">Complete Your Payment</h1>
        <p class="text-emerald-600 mt-2">Pay securely with M-Pesa</p>
    </div>

    <div class="bg-white border border-emerald-100 p-8 rounded-3xl">
        <form method="POST" action="{{ url_for('payments.initiate') }}">
            <div class="mb-5">
                <label class="text-sm font-medium">Phone Number (M-Pesa)</label>
                <input type="tel" name="phone" placeholder="2547XXXXXXXX" required 
                       class="mt-2 w-full px-5 py-3.5 border border-emerald-200 rounded-3xl text-sm">
            </div>
            
            <div class="mb-5">
                <label class="text-sm font-medium">Amount (KES)</label>
                <input type="number" name="amount" value="1000" required 
                       class="mt-2 w-full px-5 py-3.5 border border-emerald-200 rounded-3xl text-sm">
            </div>
            
            <div class="mb-5">
                <label class="text-sm font-medium">Reference</label>
                <input type="text" name="reference" value="KEMBOI-{{ current_user.id }}" required 
                       class="mt-2 w-full px-5 py-3.5 border border-emerald-200 rounded-3xl text-sm">
            </div>
            
            <button type="submit" 
                    class="w-full py-4 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-3xl mt-4">
                Pay with M-Pesa
            </button>
        </form>
        
        <div class="mt-6 text-xs text-center text-emerald-600">
            You will receive an STK Push on your phone
        </div>
    </div>
</div>
{% endblock %}

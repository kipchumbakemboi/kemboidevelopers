{% extends "base.html" %}

{% block title %}Upload Files{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto px-8 py-12">
    <h1 class="font-display text-4xl tracking-tighter mb-8">Upload Project Files</h1>
    
    <div class="bg-white border border-slate-200 p-8 rounded-3xl">
        <form method="POST" enctype="multipart/form-data">
            <div class="mb-6">
                <label class="text-sm font-medium">Select Files</label>
                <input type="file" name="files" multiple class="mt-2 w-full px-5 py-8 border border-dashed border-slate-300 rounded-3xl text-sm">
            </div>
            
            <button type="submit" class="w-full py-4 bg-emerald-600 text-white font-semibold rounded-3xl">Upload Files</button>
        </form>
    </div>
</div>
{% endblock %}

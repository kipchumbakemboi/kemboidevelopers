{% extends "base.html" %}

{% block title %}Leave a Review{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto px-8 py-12">
    <h1 class="font-display text-4xl tracking-tighter mb-8">Rate this project</h1>
    
    <div class="bg-white border border-slate-200 p-8 rounded-3xl">
        <form method="POST">
            <div class="mb-6">
                <label class="block text-sm font-medium mb-2">Rating</label>
                <div class="flex gap-x-2 text-3xl">
                    {% for i in range(1,6) %}
                    <label class="cursor-pointer">
                        <input type="radio" name="rating" value="{{ i }}" class="hidden" required>
                        <span class="text-emerald-300 hover:text-emerald-600">★</span>
                    </label>
                    {% endfor %}
                </div>
            </div>
            
            <div class="mb-6">
                <label class="text-sm font-medium">Comment</label>
                <textarea name="comment" rows="4" class="mt-2 w-full px-5 py-3.5 border border-slate-200 rounded-3xl"></textarea>
            </div>
            
            <button type="submit" class="w-full py-4 bg-emerald-600 text-white font-semibold rounded-3xl">Submit Review</button>
        </form>
    </div>
</div>
{% endblock %}
